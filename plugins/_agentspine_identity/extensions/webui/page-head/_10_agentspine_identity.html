<script>
  (() => {
    const PRODUCT = "Agentspine";
    const REPO_URL = "https://github.com/Omni-NexusAI/agent-zero";

    function patchTextNode(node) {
      if (!node?.nodeValue || !node.nodeValue.includes("Agent Zero")) return;
      node.nodeValue = node.nodeValue.replaceAll("Agent Zero", PRODUCT);
    }

    function patchBranding(root = document) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      while (walker.nextNode()) patchTextNode(walker.currentNode);
      for (const element of root.querySelectorAll?.("[title], [alt], [aria-label]") || []) {
        for (const attr of ["title", "alt", "aria-label"]) {
          const value = element.getAttribute(attr);
          if (value?.includes("Agent Zero")) element.setAttribute(attr, value.replaceAll("Agent Zero", PRODUCT));
        }
      }
      for (const link of root.querySelectorAll?.("a[href*='agent0ai/agent-zero'], a[href*='frdel/agent-zero']") || []) {
        link.href = REPO_URL;
      }
      document.title = document.title.replaceAll("Agent Zero", PRODUCT);
    }

    document.addEventListener("DOMContentLoaded", () => patchBranding(), { once: true });
    document.addEventListener("alpine:init", () => setTimeout(() => patchBranding(), 0));
    patchBranding();
    new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === 3) patchTextNode(node);
          if (node.nodeType === 1) patchBranding(node);
        }
      }
    }).observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>
