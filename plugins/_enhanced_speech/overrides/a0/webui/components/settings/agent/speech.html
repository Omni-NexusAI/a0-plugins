<html>
  <head>
    <title>Speech</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">Speech</div>
          <div class="section-description">
            Voice transcription and speech synthesis settings.
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Microphone device</div>
              <div class="field-description">Select the microphone device to use for speech-to-text.</div>
            </div>
            <div class="field-control">
              <x-component path="settings/speech/microphone.html"></x-component>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Speech-to-text model size</div>
              <div class="field-description">Select the speech-to-text model size</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.stt_model_size">
                <template x-for="option in $store.settings.additional?.stt_models" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.stt_model_size" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Speech-to-text device</div>
              <div class="field-description">Compute device for Whisper speech recognition.</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.stt_device">
                <template x-for="option in ($store.settings.additional?.stt_device_options || [{value:'auto',label:'Auto'}])" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.stt_device" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Speech-to-text language code</div>
              <div class="field-description">Language code (e.g. en, fr, it)</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.stt_language" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Microphone silence threshold</div>
              <div class="field-description">Silence detection threshold. Lower values are more sensitive to noise.</div>
            </div>
            <div class="field-control">
              <input type="range" min="0" max="1" step="0.01" x-model.number="$store.settings.settings.stt_silence_threshold" />
              <span class="range-value" x-text="$store.settings.settings.stt_silence_threshold"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Microphone silence duration (ms)</div>
              <div class="field-description">Duration of silence before the system considers speaking to have ended.</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_silence_duration" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Microphone waiting timeout (ms)</div>
              <div class="field-description">Duration of silence before the system closes the microphone.</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_waiting_timeout" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Enable Kokoro TTS</div>
              <div class="field-description">
                Enable higher quality server-side AI (Kokoro) instead of browser-based text-to-speech.
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.tts_kokoro" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <!-- Kokoro TTS Device -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">TTS device</div>
              <div class="field-description">Compute device for Kokoro TTS inference.</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.tts_device"
                      :disabled="!$store.settings.settings.tts_kokoro">
                <template x-for="option in ($store.settings.additional?.tts_device_options || [{value:'auto',label:'Auto'}])" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.tts_device" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <!-- Kokoro Remote URL -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Remote Kokoro worker URL</div>
              <div class="field-description">URL of the remote Kokoro GPU worker (for hybrid builds).</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.tts_kokoro_remote_url"
                     :disabled="!$store.settings.settings.tts_kokoro" />
            </div>
          </div>

          <!-- Kokoro Remote Token -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Remote Kokoro auth token</div>
              <div class="field-description">Bearer token for authenticating with the remote Kokoro worker.</div>
            </div>
            <div class="field-control">
              <input type="password" x-model="$store.settings.settings.tts_kokoro_remote_token"
                     :disabled="!$store.settings.settings.tts_kokoro"
                     autocomplete="off" />
            </div>
          </div>

          <!-- Kokoro Remote Timeout -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Remote Kokoro timeout (s)</div>
              <div class="field-description">Timeout in seconds for remote Kokoro worker requests.</div>
            </div>
            <div class="field-control">
              <input type="number" step="1" min="1"
                     x-model.number="$store.settings.settings.tts_kokoro_remote_timeout"
                     :disabled="!$store.settings.settings.tts_kokoro" />
            </div>
          </div>

          <!-- Kokoro Voice Selector (Primary) -->
          <div class="field" x-data="{
            open: false,
            voices: [
              {value:'af_alloy',label:'US &#8226; Female &#8226; American &#8226; af_alloy'},
              {value:'af_aoede',label:'US &#8226; Female &#8226; American &#8226; af_aoede'},
              {value:'af_bella',label:'US &#8226; Female &#8226; American &#8226; af_bella'},
              {value:'af_heart',label:'US &#8226; Female &#8226; American &#8226; af_heart'},
              {value:'af_jessica',label:'US &#8226; Female &#8226; American &#8226; af_jessica'},
              {value:'af_kore',label:'US &#8226; Female &#8226; American &#8226; af_kore'},
              {value:'af_nicole',label:'US &#8226; Female &#8226; American &#8226; af_nicole'},
              {value:'af_nova',label:'US &#8226; Female &#8226; American &#8226; af_nova'},
              {value:'af_river',label:'US &#8226; Female &#8226; American &#8226; af_river'},
              {value:'af_sarah',label:'US &#8226; Female &#8226; American &#8226; af_sarah'},
              {value:'af_sky',label:'US &#8226; Female &#8226; American &#8226; af_sky'},
              {value:'am_adam',label:'US &#8226; Male &#8226; American &#8226; am_adam'},
              {value:'am_echo',label:'US &#8226; Male &#8226; American &#8226; am_echo'},
              {value:'am_eric',label:'US &#8226; Male &#8226; American &#8226; am_eric'},
              {value:'am_fenrir',label:'US &#8226; Male &#8226; American &#8226; am_fenrir'},
              {value:'am_liam',label:'US &#8226; Male &#8226; American &#8226; am_liam'},
              {value:'am_michael',label:'US &#8226; Male &#8226; American &#8226; am_michael'},
              {value:'am_onyx',label:'US &#8226; Male &#8226; American &#8226; am_onyx'},
              {value:'am_puck',label:'US &#8226; Male &#8226; American &#8226; am_puck'},
              {value:'bf_alice',label:'GB &#8226; Female &#8226; British &#8226; bf_alice'},
              {value:'bf_emma',label:'GB &#8226; Female &#8226; British &#8226; bf_emma'},
              {value:'bf_isabella',label:'GB &#8226; Female &#8226; British &#8226; bf_isabella'},
              {value:'bf_lily',label:'GB &#8226; Female &#8226; British &#8226; bf_lily'},
              {value:'bm_daniel',label:'GB &#8226; Male &#8226; British &#8226; bm_daniel'},
              {value:'bm_fable',label:'GB &#8226; Male &#8226; British &#8226; bm_fable'},
              {value:'bm_george',label:'GB &#8226; Male &#8226; British &#8226; bm_george'},
              {value:'bm_lewis',label:'GB &#8226; Male &#8226; British &#8226; bm_lewis'}
            ],
            sep: ' \u2022 ',
            getParts(val) { return (this.voices.find(v=>v.value===val)?.label||'').split(this.sep); },
            getLabel(val) { return this.voices.find(v=>v.value===val)?.label; }
          }" @click.outside="open=false">
            <div class="field-label">
              <div class="field-title">Primary voice</div>
              <div class="field-description">Select an English (US/UK) Kokoro voice.</div>
            </div>
            <div class="field-control">
              <div class="voice-select">
                <button type="button" class="voice-select-btn"
                        :disabled="!$store.settings.settings.tts_kokoro"
                        @click="$store.settings.settings.tts_kokoro && (open = !open)">
                  <template x-if="getLabel($store.settings.settings.tts_kokoro_voice)">
                    <div>
                      <span class="voice-region" x-text="getParts($store.settings.settings.tts_kokoro_voice)[0]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="getParts($store.settings.settings.tts_kokoro_voice)[1]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="getParts($store.settings.settings.tts_kokoro_voice)[2]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-name" x-text="getParts($store.settings.settings.tts_kokoro_voice)[3]"></span>
                    </div>
                  </template>
                  <template x-if="!getLabel($store.settings.settings.tts_kokoro_voice)">
                    <span>Select voice...</span>
                  </template>
                </button>
                <div class="voice-select-list" x-show="open && $store.settings.settings.tts_kokoro" x-transition>
                  <template x-for="option in voices" :key="option.value">
                    <div class="voice-option"
                         @click="$store.settings.settings.tts_kokoro_voice = option.value; open=false"
                         x-data="{ parts: option.label.split(sep) }">
                      <span class="voice-region" x-text="parts[0]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="parts[1]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="parts[2]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-name" x-text="parts[3]"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- Kokoro Voice Selector (Secondary / Blend) -->
          <div class="field" x-data="{
            open: false,
            voices: [
              {value:'',label:'None'},
              {value:'af_alloy',label:'US &#8226; Female &#8226; American &#8226; af_alloy'},
              {value:'af_aoede',label:'US &#8226; Female &#8226; American &#8226; af_aoede'},
              {value:'af_bella',label:'US &#8226; Female &#8226; American &#8226; af_bella'},
              {value:'af_heart',label:'US &#8226; Female &#8226; American &#8226; af_heart'},
              {value:'af_jessica',label:'US &#8226; Female &#8226; American &#8226; af_jessica'},
              {value:'af_kore',label:'US &#8226; Female &#8226; American &#8226; af_kore'},
              {value:'af_nicole',label:'US &#8226; Female &#8226; American &#8226; af_nicole'},
              {value:'af_nova',label:'US &#8226; Female &#8226; American &#8226; af_nova'},
              {value:'af_river',label:'US &#8226; Female &#8226; American &#8226; af_river'},
              {value:'af_sarah',label:'US &#8226; Female &#8226; American &#8226; af_sarah'},
              {value:'af_sky',label:'US &#8226; Female &#8226; American &#8226; af_sky'},
              {value:'am_adam',label:'US &#8226; Male &#8226; American &#8226; am_adam'},
              {value:'am_echo',label:'US &#8226; Male &#8226; American &#8226; am_echo'},
              {value:'am_eric',label:'US &#8226; Male &#8226; American &#8226; am_eric'},
              {value:'am_fenrir',label:'US &#8226; Male &#8226; American &#8226; am_fenrir'},
              {value:'am_liam',label:'US &#8226; Male &#8226; American &#8226; am_liam'},
              {value:'am_michael',label:'US &#8226; Male &#8226; American &#8226; am_michael'},
              {value:'am_onyx',label:'US &#8226; Male &#8226; American &#8226; am_onyx'},
              {value:'am_puck',label:'US &#8226; Male &#8226; American &#8226; am_puck'},
              {value:'bf_alice',label:'GB &#8226; Female &#8226; British &#8226; bf_alice'},
              {value:'bf_emma',label:'GB &#8226; Female &#8226; British &#8226; bf_emma'},
              {value:'bf_isabella',label:'GB &#8226; Female &#8226; British &#8226; bf_isabella'},
              {value:'bf_lily',label:'GB &#8226; Female &#8226; British &#8226; bf_lily'},
              {value:'bm_daniel',label:'GB &#8226; Male &#8226; British &#8226; bm_daniel'},
              {value:'bm_fable',label:'GB &#8226; Male &#8226; British &#8226; bm_fable'},
              {value:'bm_george',label:'GB &#8226; Male &#8226; British &#8226; bm_george'},
              {value:'bm_lewis',label:'GB &#8226; Male &#8226; British &#8226; bm_lewis'}
            ],
            sep: ' \u2022 ',
            getParts(val) { if(!val) return ['None']; return (this.voices.find(v=>v.value===val)?.label||'').split(this.sep); },
            getLabel(val) { if(!val) return 'None'; return this.voices.find(v=>v.value===val)?.label; }
          }" @click.outside="open=false">
            <div class="field-label">
              <div class="field-title">Blend with (optional)</div>
              <div class="field-description">Optional secondary voice to blend.</div>
            </div>
            <div class="field-control">
              <div class="voice-select">
                <button type="button" class="voice-select-btn"
                        :disabled="!$store.settings.settings.tts_kokoro"
                        @click="$store.settings.settings.tts_kokoro && (open = !open)">
                  <template x-if="$store.settings.settings.tts_kokoro_voice_secondary && getLabel($store.settings.settings.tts_kokoro_voice_secondary)">
                    <div>
                      <span class="voice-region" x-text="getParts($store.settings.settings.tts_kokoro_voice_secondary)[0]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="getParts($store.settings.settings.tts_kokoro_voice_secondary)[1]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-meta" x-text="getParts($store.settings.settings.tts_kokoro_voice_secondary)[2]"></span>
                      <span class="voice-sep"> &bull; </span>
                      <span class="voice-name" x-text="getParts($store.settings.settings.tts_kokoro_voice_secondary)[3]"></span>
                    </div>
                  </template>
                  <template x-if="!$store.settings.settings.tts_kokoro_voice_secondary">
                    <span>None</span>
                  </template>
                </button>
                <div class="voice-select-list" x-show="open && $store.settings.settings.tts_kokoro" x-transition>
                  <template x-for="option in voices" :key="'sec_'+option.value">
                    <div class="voice-option"
                         @click="$store.settings.settings.tts_kokoro_voice_secondary = option.value; open=false">
                      <template x-if="option.value">
                        <div x-data="{ parts: option.label.split(sep) }">
                          <span class="voice-region" x-text="parts[0]"></span>
                          <span class="voice-sep"> &bull; </span>
                          <span class="voice-meta" x-text="parts[1]"></span>
                          <span class="voice-sep"> &bull; </span>
                          <span class="voice-meta" x-text="parts[2]"></span>
                          <span class="voice-sep"> &bull; </span>
                          <span class="voice-name" x-text="parts[3]"></span>
                        </div>
                      </template>
                      <template x-if="!option.value">
                        <span>None</span>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- Kokoro Voice Blend Ratio -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Primary voice blend %</div>
              <div class="field-description">Percentage of the primary voice used when blending (50 = 50/50 split).</div>
            </div>
            <div class="field-control">
              <input type="range" min="1" max="99" step="1"
                     x-model.number="$store.settings.settings.tts_kokoro_voice_blend"
                     :disabled="!$store.settings.settings.tts_kokoro" />
              <span class="range-value"
                    x-text="`${$store.settings.settings.tts_kokoro_voice_blend || 50}% / ${100 - ($store.settings.settings.tts_kokoro_voice_blend || 50)}%`"></span>
            </div>
          </div>

          <!-- Kokoro Voice Speed -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Voice speed</div>
              <div class="field-description">Kokoro TTS playback speed multiplier.</div>
            </div>
            <div class="field-control">
              <input type="number" step="0.1" min="0.5" max="2.0"
                     x-model.number="$store.settings.settings.tts_kokoro_speed"
                     :disabled="!$store.settings.settings.tts_kokoro" />
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
