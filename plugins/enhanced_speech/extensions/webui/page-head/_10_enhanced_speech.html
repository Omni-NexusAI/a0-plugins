<script>
  (() => {
    const defaults = {
      tts_device: "auto",
      tts_kokoro_voice: "am_michael",
      tts_kokoro_voice_secondary: "",
      tts_kokoro_voice_blend: 50,
      tts_kokoro_speed: 1.1,
      tts_kokoro_remote_url: "",
      tts_kokoro_remote_token: "",
      tts_kokoro_remote_timeout: 20,
    };

    function patchSettingsStore() {
      const store = globalThis.Alpine?.store?.("settings");
      if (!store?.settings || store.__enhancedSpeechPatched) return;
      for (const [key, value] of Object.entries(defaults)) {
        if (!(key in store.settings)) store.settings[key] = value;
      }
      store.additional = store.additional || {};
      if (!Array.isArray(store.additional.tts_device_options)) {
        store.additional.tts_device_options = [{ value: "auto", label: "Auto" }, { value: "cpu", label: "CPU" }];
      }
      store.__enhancedSpeechPatched = true;
    }

    document.addEventListener("alpine:init", () => setTimeout(patchSettingsStore, 0));
    document.addEventListener("DOMContentLoaded", patchSettingsStore, { once: true });
    new MutationObserver(patchSettingsStore).observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>
